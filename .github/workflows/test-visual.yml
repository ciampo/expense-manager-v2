name: Visual Regression Tests
on:
  push:
    branches: [main]
  pull_request:

env:
  VITE_CONVEX_URL: ${{ secrets.CONVEX_TEST_URL }}

concurrency:
  group: convex-test-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    container:
      # Keep in sync with @playwright/test version in package.json
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - run: pnpm test:visual
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-visual
          path: playwright-report-visual/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
