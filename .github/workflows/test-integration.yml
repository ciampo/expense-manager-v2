name: Integration Tests
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

env:
  VITE_CONVEX_URL: ${{ secrets.CONVEX_TEST_URL }}
  # Cloudflare Turnstile always-pass test key — renders the widget without blocking test automation
  VITE_TURNSTILE_SITE_KEY: '1x00000000000000000000AA'

# Two-level concurrency:
#
# 1. Workflow-level (below): for PRs, scoped by ref — a new push to
#    the same branch cancels any in-progress run. For pushes to main,
#    each run gets a unique group (via run_id) so runs are never
#    evicted. Native concurrency groups silently drop the oldest
#    pending run when a third arrives — even with cancel-in-progress
#    off — so a shared group would lose main runs under bursty merges.
#
# 2. Job-level: the convex-test-lock composite action implements a
#    spinlock via git refs (branch mutex/convex-test-deploy). The ref
#    is never deleted — state is encoded in commit messages (lock:* =
#    held, released:* = free) and updateRef(force: false) acts as an
#    atomic compare-and-swap. Unlike native concurrency groups, this
#    supports unlimited queue depth with no evictions. A stale-timeout
#    auto-releases locks from crashed/timed-out jobs.
#
# PR jobs are opt-in: they only run when the "ci: integration" label
# is present on a same-repo PR. Fork PRs are excluded because the
# pull_request token from forks is read-only and cannot manage the
# lock ref. This keeps the lock queue short and avoids burning
# runner minutes on PRs that don't need pre-merge integration
# validation. All changes get integration-tested on merge to main.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('integration-{0}', github.ref) || format('integration-{0}-{1}', github.ref, github.run_id) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  e2e:
    if: "${{ github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'ci: integration') && github.event.pull_request.head.repo.full_name == github.repository) }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Acquire Convex test lock
        id: lock
        uses: ./.github/actions/convex-test-lock
        with:
          mode: lock
          stale-timeout: '1500'
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Ensure E2E cleanup guardrail is set
        run: npx convex env set E2E_CLEANUP_ALLOWED true --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup stale test data
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Release Convex test lock
        if: always() && steps.lock.outputs.acquired == 'true'
        uses: ./.github/actions/convex-test-lock
        with:
          mode: unlock
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  visual:
    needs: e2e
    if: "${{ always() && !cancelled() && (github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'ci: integration') && github.event.pull_request.head.repo.full_name == github.repository)) }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      # Version coupled: tag must match @playwright/test and playwright versions
      # in package.json (source of truth). Format: v<version>-noble
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Acquire Convex test lock
        id: lock
        uses: ./.github/actions/convex-test-lock
        with:
          mode: lock
          stale-timeout: '1500'
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Ensure E2E cleanup guardrail is set
        run: npx convex env set E2E_CLEANUP_ALLOWED true --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup stale test data
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run visual tests
        run: pnpm test:visual
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Release Convex test lock
        if: always() && steps.lock.outputs.acquired == 'true'
        uses: ./.github/actions/convex-test-lock
        with:
          mode: unlock
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-visual
          path: playwright-report-visual/
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results
          path: test-results/
