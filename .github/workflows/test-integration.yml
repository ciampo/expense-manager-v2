name: Integration Tests
on:
  push:
    branches: [main]
  pull_request:

env:
  VITE_CONVEX_URL: ${{ secrets.CONVEX_TEST_URL }}

# Two-level concurrency:
#
# 1. Workflow-level (below): scoped by ref. A new push to the SAME
#    branch cancels any in-progress run for that branch, so only the
#    latest commit is tested. Different branches don't interfere.
#
# 2. Job-level (on each job): the shared `convex-test-deploy` group
#    serializes all access to the Convex test backend across every
#    branch. This prevents concurrent deploys/seeds/cleanups from
#    corrupting each other's test data. `cancel-in-progress: false`
#    ensures queued jobs wait rather than cancel — so a main run
#    waiting behind a PR job will start as soon as the PR job finishes,
#    and vice-versa.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: convex-test-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Ensure E2E cleanup guardrail is set
        run: npx convex env set E2E_CLEANUP_ALLOWED true --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup stale test data
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  visual:
    needs: e2e
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: convex-test-deploy
      cancel-in-progress: false
    container:
      # Keep in sync with Playwright packages in package.json
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Ensure E2E cleanup guardrail is set
        run: npx convex env set E2E_CLEANUP_ALLOWED true --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup stale test data
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run visual tests
        run: pnpm test:visual
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-visual
          path: playwright-report-visual/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
