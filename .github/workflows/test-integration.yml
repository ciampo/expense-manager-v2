name: Integration Tests
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

env:
  VITE_CONVEX_URL: ${{ secrets.CONVEX_TEST_URL }}

# Two-level concurrency:
#
# 1. Workflow-level (below): scoped by ref. A new push to the SAME
#    branch cancels any in-progress run for that branch, so only the
#    latest commit is tested. Different branches don't interfere.
#    cancel-in-progress is OFF for main — every merge must complete its
#    tests so the deploy gate can fire.
#
# 2. Job-level: the convex-test-lock composite action implements a
#    spinlock via git refs (branch mutex/convex-test-deploy). Unlike
#    native concurrency groups (which cap at 1 pending and silently
#    evict older waiters), the spinlock lets any number of jobs queue
#    and guarantees none are cancelled while waiting. A stale-timeout
#    auto-releases locks from crashed/timed-out jobs.
#
# PR jobs are opt-in: they only run when the "ci: integration" label
# is present. This keeps the lock queue short and avoids burning
# runner minutes on PRs that don't need pre-merge integration
# validation. All changes get integration-tested on merge to main.
concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write

jobs:
  e2e:
    if: "${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci: integration') }}"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Acquire Convex test lock
        id: lock
        uses: ./.github/actions/convex-test-lock
        with:
          mode: lock
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Ensure E2E cleanup guardrail is set
        run: npx convex env set E2E_CLEANUP_ALLOWED true --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup stale test data
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Release Convex test lock
        if: always() && steps.lock.outputs.acquired == 'true'
        uses: ./.github/actions/convex-test-lock
        with:
          mode: unlock
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  visual:
    needs: e2e
    if: "${{ always() && !cancelled() && (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'ci: integration')) }}"
    runs-on: ubuntu-latest
    timeout-minutes: 40
    container:
      # Version coupled: tag must match @playwright/test and playwright versions
      # in package.json (source of truth). Format: v<version>-noble
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    steps:
      - uses: actions/checkout@v4
      - name: Acquire Convex test lock
        id: lock
        uses: ./.github/actions/convex-test-lock
        with:
          mode: lock
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Deploy Convex functions
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Ensure E2E cleanup guardrail is set
        run: npx convex env set E2E_CLEANUP_ALLOWED true --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run post-deploy migrations
        run: npx convex run seed:postDeploy --prod
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup stale test data
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Seed test data
        run: pnpm test:e2e:seed
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Run visual tests
        run: pnpm test:visual
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Cleanup test data (safety net)
        if: always()
        run: pnpm test:e2e:cleanup
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_TEST_DEPLOY_KEY }}
      - name: Release Convex test lock
        if: always() && steps.lock.outputs.acquired == 'true'
        uses: ./.github/actions/convex-test-lock
        with:
          mode: unlock
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-visual
          path: playwright-report-visual/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
