name: 'Convex Test Backend Lock'
description: >
  Acquire or release a mutex for the shared Convex test backend.
  Uses a git branch ref as a spinlock — createRef is atomic, so only
  one job can hold the lock at a time. All others poll until it's free.

inputs:
  mode:
    description: '"lock" to acquire, "unlock" to release'
    required: true
  branch:
    description: 'Branch name used as the lock ref'
    required: false
    default: 'mutex/convex-test-deploy'
  poll-interval:
    description: 'Seconds between acquisition attempts'
    required: false
    default: '15'
  stale-timeout:
    description: 'Seconds after which a held lock is considered stale and force-released'
    required: false
    default: '3000'

outputs:
  acquired:
    description: 'Whether this job successfully acquired the lock'
    value: ${{ steps.acquire.outputs.acquired || 'false' }}

runs:
  using: composite
  steps:
    - name: Validate mode
      if: inputs.mode != 'lock' && inputs.mode != 'unlock'
      shell: bash
      run: |
        echo "::error::Invalid mode '${{ inputs.mode }}'. Must be 'lock' or 'unlock'."
        exit 1

    - name: Acquire lock
      id: acquire
      if: inputs.mode == 'lock'
      uses: actions/github-script@v7
      env:
        LOCK_BRANCH: ${{ inputs.branch }}
        POLL_INTERVAL: ${{ inputs.poll-interval }}
        STALE_TIMEOUT: ${{ inputs.stale-timeout }}
      with:
        script: |
          const lockRef = `heads/${process.env.LOCK_BRANCH}`;

          const DEFAULT_POLL_MS = 15_000;
          const DEFAULT_STALE_MS = 3_000_000;
          let poll = parseInt(process.env.POLL_INTERVAL, 10) * 1000;
          if (!Number.isFinite(poll) || poll <= 0) {
            core.warning(`Invalid POLL_INTERVAL "${process.env.POLL_INTERVAL}", using default ${DEFAULT_POLL_MS / 1000}s`);
            poll = DEFAULT_POLL_MS;
          }
          let staleTTL = parseInt(process.env.STALE_TIMEOUT, 10) * 1000;
          if (!Number.isFinite(staleTTL) || staleTTL <= 0) {
            core.warning(`Invalid STALE_TIMEOUT "${process.env.STALE_TIMEOUT}", using default ${DEFAULT_STALE_MS / 1000}s`);
            staleTTL = DEFAULT_STALE_MS;
          }

          const { owner, repo } = context.repo;
          const lockId = `lock:${context.runId}:${context.job}`;

          async function createLockCommit() {
            const { data: blob } = await github.rest.git.createBlob({
              owner, repo, content: lockId, encoding: 'utf-8',
            });
            const { data: tree } = await github.rest.git.createTree({
              owner, repo,
              tree: [{ path: 'lock', mode: '100644', sha: blob.sha }],
            });
            const { data: commit } = await github.rest.git.createCommit({
              owner, repo, message: lockId, tree: tree.sha, parents: [],
            });
            return commit.sha;
          }

          const lockSha = await createLockCommit();

          // Spin until the lock is ours or the job times out.
          while (true) {
            try {
              await github.rest.git.createRef({
                owner, repo, ref: `refs/${lockRef}`, sha: lockSha,
              });
              core.info(`Lock acquired (${lockId})`);
              core.setOutput('acquired', 'true');
              return;
            } catch (e) {
              if (e.status !== 422) throw e;

              // Lock exists — check for staleness.
              try {
                const { data: ref } = await github.rest.git.getRef({ owner, repo, ref: lockRef });
                const { data: commit } = await github.rest.git.getCommit({
                  owner, repo, commit_sha: ref.object.sha,
                });
                const age = Date.now() - new Date(commit.committer.date).getTime();
                core.info(`Lock held by ${commit.message} (age ${Math.round(age / 1000)}s)`);

                if (age > staleTTL) {
                  core.warning(`Force-releasing stale lock (${Math.round(age / 1000)}s > ${staleTTL / 1000}s)`);
                  await github.rest.git.deleteRef({ owner, repo, ref: lockRef });
                  continue;
                }
              } catch (refErr) {
                if (refErr.status === 404) continue; // released between check and delete
                throw refErr;
              }

              const jitter = poll * (0.75 + Math.random() * 0.5);
              await new Promise(r => setTimeout(r, jitter));
            }
          }

    - name: Release lock
      if: inputs.mode == 'unlock'
      uses: actions/github-script@v7
      env:
        LOCK_BRANCH: ${{ inputs.branch }}
      with:
        script: |
          const lockRef = `heads/${process.env.LOCK_BRANCH}`;
          const { owner, repo } = context.repo;
          const lockId = `lock:${context.runId}:${context.job}`;
          const MAX_RETRIES = 3;
          const RETRY_DELAY_MS = 2000;

          for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
            try {
              const { data: ref } = await github.rest.git.getRef({ owner, repo, ref: lockRef });
              const { data: commit } = await github.rest.git.getCommit({
                owner, repo, commit_sha: ref.object.sha,
              });

              if (commit.message !== lockId) {
                core.info(`Lock held by different job (${commit.message}), skipping release`);
                return;
              }

              await github.rest.git.deleteRef({ owner, repo, ref: lockRef });
              core.info(`Lock released (${lockId})`);
              return;
            } catch (e) {
              if (e.status === 404) {
                core.info('Lock already released');
                return;
              }
              if (attempt < MAX_RETRIES) {
                core.warning(`Unlock attempt ${attempt}/${MAX_RETRIES} failed: ${e.message}. Retrying...`);
                await new Promise(r => setTimeout(r, RETRY_DELAY_MS));
              } else {
                core.setFailed(`Failed to release lock after ${MAX_RETRIES} attempts: ${e.message}`);
              }
            }
          }
